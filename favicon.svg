<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="55%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#e0a800"/>
    </linearGradient>
  </defs>

  <!-- Outer badge -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)" stroke="url(#gold)" stroke-width="4"/>

  <!-- Brushstroke swoosh, echoing an artist's stroke -->
  <path d="M26 92 C 40 60, 55 35, 96 24"
        fill="none" stroke="url(#gold)" stroke-width="7"
        stroke-linecap="round" opacity="0.32"/>

  <!-- Paint dab accent -->
  <circle cx="96" cy="26" r="6" fill="url(#gold)" opacity="0.85"/>

  <!-- Monogram -->
  <text x="64" y="80" font-family="Georgia, 'Times New Roman', serif"
        font-size="50" font-weight="700" fill="url(#gold)"
        text-anchor="middle" letter-spacing="-1">AJ</text>

  <!-- Underline flourish -->
  <path d="M40 90 Q64 98 88 90" fill="none" stroke="url(#gold)"
        stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
</svg>
